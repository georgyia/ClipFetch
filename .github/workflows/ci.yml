name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install (with dev extras)
        run: pip install -e ".[dev,web]"
      - name: Ruff
        run: ruff check .
      - name: Mypy
        # Configured in pyproject; the 3.9 jobs in the test matrix cover the
        # oldest supported runtime.
        run: mypy

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install (with dev extras)
        run: pip install -e ".[dev,web]"
      - name: Run tests
        # The suite uses fakes and a local HTTP server, so no browser binary
        # is downloaded — the Playwright package import alone is enough.
        run: python -m pytest -q
