name: Release

# Publish to PyPI when a version tag is pushed (e.g. v0.1.0). Uses PyPI
# Trusted Publishing (OIDC) — no API token needed. Configure the project's
# trusted publisher at https://pypi.org/manage/account/publishing/ with:
#   owner: georgyia   repo: ClipFetch   workflow: release.yml   environment: pypi

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
