name: Bug report
description: Report a defect in ClipFetch
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. **Please do not paste cookies, tokens, or other secrets.**
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I reproduced this on the latest version.
          required: true
        - label: This is not a security vulnerability (those go to SECURITY.md).
          required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug — what you expected vs. what actually happened.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact command(s) and what you did.
      placeholder: |
        1. Ran `clipfetch -reels 5 @nasa`
        2. ...
    validations:
      required: true
  - type: dropdown
    id: source
    attributes:
      label: Content source
      options:
        - Instagram (feed)
        - Instagram (account)
        - TikTok (experimental)
        - Not source-specific
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS 15.5 / Ubuntu 24.04 / Windows 11
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: ClipFetch version or commit
      description: Output of `clipfetch --version`, or the commit SHA.
  - type: textarea
    id: logs
    attributes:
      label: Output / logs
      description: Paste relevant output. Redact anything private.
      render: shell
